

# ==========================================
# DEFAULT DATASOURCE (MySQL)
# ==========================================
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=root
quarkus.datasource.password=root
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/quarkus_db

# ==========================================
# H2 DATASOURCE
# ==========================================
quarkus.datasource.h2.db-kind=h2
quarkus.datasource.h2.username=sa
quarkus.datasource.h2.password=sa
quarkus.datasource.h2.jdbc.url=jdbc:h2:file:./logs/auditdb
#quarkus.datasource.h2.jdbc.url=jdbc:h2:mem:auditdb

# ==========================================
# MYSQL PERSISTENCE UNIT
# ==========================================
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.packages=org.raku.model.mysql

# ==========================================
# H2 PERSISTENCE UNIT
# ==========================================
quarkus.hibernate-orm."h2".datasource=h2
quarkus.hibernate-orm."h2".packages=org.raku.model.h2db
quarkus.hibernate-orm."h2".database.generation=update

# ==========================================
# HEALTH CHECK
# ==========================================
quarkus.smallrye-health.root-path=/q/health

# ==========================================
# LOGGING
# ==========================================
quarkus.log.level=INFO
quarkus.hibernate-orm.log.bind-parameters=true

# ==========================================
# JWT AUTH
# ==========================================
mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.issuer=quarkus-app




